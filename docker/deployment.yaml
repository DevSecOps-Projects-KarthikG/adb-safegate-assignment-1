# =============================================================================
# ADB SAFEGATE – Hello App Kubernetes Deployment
# =============================================================================
# Security controls applied:
#   - runAsNonRoot: true              → enforces non-root at K8s level
#   - runAsUser: 10001                → matches Dockerfile UID
#   - readOnlyRootFilesystem: true    → prevents runtime file tampering
#   - allowPrivilegeEscalation: false → prevents sudo/setuid escalation
#   - capabilities drop ALL           → removes all Linux capabilities
#   - seccompProfile RuntimeDefault   → restricts syscalls
#
# Reference: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
#            https://kubernetes.io/docs/concepts/security/pod-security-standards/
# =============================================================================

# ── Namespace ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: hello-app
  labels:
    name: hello-app

---

# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app
  namespace: hello-app
  labels:
    app: hello-app
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-app
  template:
    metadata:
      labels:
        app: hello-app
    spec:
      # Pod-level security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: hello-app
          image: hello-app:latest
          # Never pull – image loaded via: docker save | k3s ctr images import
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
              name: http
              protocol: TCP

          # Container-level security context
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # Resource limits – prevent resource starvation in shared clusters
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"

          # Liveness probe – K8s restarts container if this fails
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness probe – K8s routes traffic only when this passes
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # /tmp required when readOnlyRootFilesystem: true
          # Python/Flask may write temporary files
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp

      volumes:
        - name: tmp-dir
          emptyDir: {}

---

# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: hello-app-service
  namespace: hello-app
  labels:
    app: hello-app
spec:
  type: NodePort
  selector:
    app: hello-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30080

---

# ── Network Policy ────────────────────────────────────────────────────────────
# Deny all by default, allow only on port 5000
# Reference: https://kubernetes.io/docs/concepts/services-networking/network-policies/
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hello-app-netpol
  namespace: hello-app
spec:
  podSelector:
    matchLabels:
      app: hello-app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 5000
  egress:
    - {}
