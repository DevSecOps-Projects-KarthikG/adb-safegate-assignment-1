# =============================================================================
# ADB SAFEGATE – Enterprise DevSecOps CI/CD Pipeline
# =============================================================================
# Pipeline  : Full DevSecOps for Hello App – Container + Kubernetes
# Stages    : Pre-flight → SAST/Quality → SCA/SBOM → Build/IaC
#             → Image Security → Deploy → Runtime + DAST + Compliance
#
# Security Tools:
#   Secret Scanning  : Gitleaks, detect-secrets, truffleHog
#   SAST             : Bandit, Semgrep, SonarQube Quality Gate
#   SCA              : pip-audit, Trivy FS, Dependency-Track
#   SBOM             : Syft (CycloneDX + SPDX), Trivy SBOM
#   IaC Security     : Hadolint, Checkov, Trivy config
#   Policy as Code   : OPA/Conftest, OPA Gatekeeper (K8s admission)
#   Image Security   : Trivy image, Grype, Cosign (signing + verify)
#   Runtime Security : Falco (DaemonSet syscall monitoring)
#   DAST             : OWASP ZAP baseline scan
#   Compliance       : kube-bench (CIS K8s), Lynis (OS)
#
# Enterprise Patterns:
#   Shift-Left, Fast-Fail, Supply Chain Security, Policy as Code,
#   Runtime Threat Detection, Automated Quality Gates, SLSA L2
#
# Author    : Kartik Gundu
# References:
#   https://docs.microsoft.com/en-us/azure/devops/pipelines/
#   https://owasp.org/www-project-devsecops-guideline/
#   https://slsa.dev/
# =============================================================================

trigger:
  branches:
    include:
      - main
      - develop
      - 'release/*'
  paths:
    include:
      - docker/**
      - k8s-cluster/**
      - os-hardening/**

pr:
  branches:
    include:
      - main
      - develop

# ── Variable Groups ───────────────────────────────────────────────────────────
variables:
- group: 'adb-safegate-secrets'       # ACR_PASSWORD, SONAR_TOKEN, COSIGN_KEY
- group: 'adb-safegate-config'        # Non-secret config values

- name: DOCKER_REGISTRY
  value: 'adbsafegate.azurecr.io'
- name: IMAGE_NAME
  value: 'hello-app'
- name: IMAGE_TAG
  value: '$(Build.BuildId)'
- name: IMAGE_FULL
  value: '$(DOCKER_REGISTRY)/$(IMAGE_NAME):$(IMAGE_TAG)'

# Kubernetes
- name: K8S_NAMESPACE
  value: 'hello-app'
- name: DEPLOYMENT_NAME
  value: 'hello-app'

# Security gates
- name: TRIVY_CRITICAL_EXIT_CODE
  value: '1'
- name: SONAR_QUALITY_GATE_WAIT
  value: 'true'

- name: PYTHON_VERSION
  value: '3.11'
- name: BUILD_POOL
  value: 'ubuntu-latest'

# =============================================================================
# STAGE 0 – PRE-FLIGHT: Secret Scanning (Fast Fail)
# Catch secrets committed to repo BEFORE anything else runs
# Tools: Gitleaks, detect-secrets, truffleHog
# =============================================================================
stages:
- stage: PreFlight
  displayName: 'Stage 0 - Secret Scanning (Fast Fail)'
  jobs:
  - job: SecretScan
    displayName: 'Secret and Credential Detection'
    pool:
      vmImage: $(BUILD_POOL)
    steps:

    - checkout: self
      fetchDepth: 0

    # Gitleaks – entire git history
    # Reference: https://github.com/gitleaks/gitleaks
    - script: |
        echo "=== Gitleaks – scanning git history for secrets ==="
        docker run --rm \
          -v $(Build.SourcesDirectory):/repo \
          ghcr.io/gitleaks/gitleaks:latest \
          detect \
          --source /repo \
          --report-format json \
          --report-path /repo/gitleaks-report.json \
          --exit-code 1
        echo "PASS: Gitleaks – no secrets in git history"
      displayName: 'Gitleaks – git history secret scan (HARD FAIL)'

    # detect-secrets – OWASP approach
    # Reference: https://github.com/Yelp/detect-secrets
    - script: |
        echo "=== detect-secrets – working tree scan ==="
        pip install detect-secrets
        detect-secrets scan \
          --all-files \
          --exclude-files '\.git/.*' \
          --exclude-files '.*\.png' > .secrets.baseline
        detect-secrets audit .secrets.baseline
        echo "PASS: detect-secrets – no secrets found"
      displayName: 'detect-secrets – baseline scan'

    # truffleHog – entropy-based detection
    # Reference: https://github.com/trufflesecurity/trufflehog
    - script: |
        echo "=== truffleHog – entropy-based secret detection ==="
        docker run --rm \
          -v $(Build.SourcesDirectory):/repo \
          trufflesecurity/trufflehog:latest \
          filesystem /repo \
          --json \
          --no-update 2>/dev/null | tee trufflehog-report.json
        if [ -s trufflehog-report.json ]; then
          echo "FAIL: truffleHog detected potential secrets"
          cat trufflehog-report.json
          exit 1
        fi
        echo "PASS: truffleHog – no secrets detected"
      displayName: 'truffleHog – entropy-based detection (HARD FAIL)'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish secret scan reports'
      inputs:
        PathtoPublish: '$(Build.SourcesDirectory)'
        ArtifactName: '00-secret-scan-reports'
      condition: always()

# =============================================================================
# STAGE 1 – SAST + SONARQUBE QUALITY GATE
# Static security analysis – blocks pipeline if quality gate fails
# Tools: Bandit, Semgrep, SonarQube
# =============================================================================
- stage: SAST
  displayName: 'Stage 1 - SAST + SonarQube Quality Gate'
  dependsOn: PreFlight
  jobs:
  - job: StaticAnalysis
    displayName: 'SAST and Code Quality'
    pool:
      vmImage: $(BUILD_POOL)
    steps:

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(PYTHON_VERSION)'

    - script: pip install bandit semgrep pylint
      displayName: 'Install SAST tools'

    # Bandit – Python SAST
    # Reference: https://bandit.readthedocs.io/
    - script: |
        echo "=== Bandit – Python security analysis ==="
        bandit -r docker/ \
          --severity-level medium \
          --confidence-level medium \
          --format json \
          --output bandit-report.json
        bandit -r docker/ \
          --severity-level medium \
          --confidence-level medium
        echo "PASS: Bandit – no medium/high security issues"
      displayName: 'Bandit – Python SAST (injections, secrets, OWASP)'

    # Semgrep – OWASP Top 10 ruleset
    # Reference: https://semgrep.dev/
    - script: |
        echo "=== Semgrep – OWASP Top 10 SAST ==="
        semgrep scan \
          --config "p/owasp-top-ten" \
          --config "p/python" \
          --config "p/docker" \
          --json \
          --output semgrep-report.json \
          docker/ || true
        semgrep scan \
          --config "p/owasp-top-ten" \
          --config "p/python" \
          docker/
        echo "PASS: Semgrep – OWASP Top 10 scan complete"
      displayName: 'Semgrep – OWASP Top 10 SAST'

    # SonarQube – Quality Gate (blocks pipeline)
    # Reference: https://docs.sonarqube.org/
    - task: SonarQubePrepare@5
      displayName: 'SonarQube – Prepare analysis'
      inputs:
        SonarQube: 'SonarQube-ADB-SAFEGATE'
        scannerMode: 'CLI'
        configMode: 'manual'
        cliProjectKey: 'adb-safegate-hello-app'
        cliProjectName: 'ADB SAFEGATE Hello App'
        cliSources: 'docker'
        extraProperties: |
          sonar.python.version=3.11
          sonar.exclusions=**/*.png,**/*.jpg
          sonar.qualitygate.wait=$(SONAR_QUALITY_GATE_WAIT)

    - task: SonarQubeAnalyze@5
      displayName: 'SonarQube – Run analysis'

    - task: SonarQubePublishBuildSummary@5
      displayName: 'SonarQube – Quality Gate (HARD FAIL if gate fails)'
      inputs:
        pollingTimeoutSec: '300'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish SAST reports'
      inputs:
        PathtoPublish: '$(Build.SourcesDirectory)'
        ArtifactName: '01-sast-reports'
      condition: always()

# =============================================================================
# STAGE 2 – SCA + SBOM GENERATION
# Dependency vulnerability check + supply chain inventory
# Tools: pip-audit, Trivy FS, Syft, Dependency-Track
# =============================================================================
- stage: SCA_SBOM
  displayName: 'Stage 2 - SCA and SBOM Generation'
  dependsOn: SAST
  jobs:
  - job: SCA_SBOM
    displayName: 'Dependency Scan and SBOM'
    pool:
      vmImage: $(BUILD_POOL)
    steps:

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(PYTHON_VERSION)'

    # pip-audit – Python SCA
    # Reference: https://pypi.org/project/pip-audit/
    - script: |
        echo "=== pip-audit – Python dependency SCA ==="
        pip install pip-audit
        pip-audit \
          -r docker/requirements.txt \
          --format json \
          --output pip-audit-report.json || true
        pip-audit \
          -r docker/requirements.txt \
          --strict
        echo "PASS: pip-audit – no known vulnerabilities"
      displayName: 'pip-audit – Python SCA (HARD FAIL on vulnerability)'

    # Trivy filesystem SCA
    - script: |
        echo "=== Trivy filesystem SCA scan ==="
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
        trivy fs \
          --severity CRITICAL,HIGH \
          --exit-code 1 \
          --ignore-unfixed \
          --format json \
          --output trivy-fs-report.json \
          docker/
        echo "PASS: Trivy FS – no CRITICAL vulnerabilities in source"
      displayName: 'Trivy filesystem SCA (HARD FAIL on CRITICAL)'

    # Syft – SBOM generation (CycloneDX + SPDX)
    # Reference: https://github.com/anchore/syft
    # SLSA compliance: https://slsa.dev/
    - script: |
        echo "=== Syft – SBOM generation (CycloneDX + SPDX) ==="
        curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin
        syft dir:docker/ --output cyclonedx-json=sbom-cyclonedx.json
        syft dir:docker/ --output spdx-json=sbom-spdx.json
        echo "PASS: SBOM generated – CycloneDX + SPDX formats"
        python3 -c "
        import json
        with open('sbom-cyclonedx.json') as f:
            d = json.load(f)
        print(f'  Components: {len(d.get(\"components\",[]))}')
        " 2>/dev/null || true
      displayName: 'Syft – SBOM generation (CycloneDX + SPDX) – SLSA L2'

    # Upload SBOM to Dependency-Track
    # Reference: https://docs.dependencytrack.org/
    - script: |
        echo "=== Uploading SBOM to Dependency-Track ==="
        if [ -n "$(DEPENDENCY_TRACK_URL)" ]; then
          curl -X POST \
            "$(DEPENDENCY_TRACK_URL)/api/v1/bom" \
            -H "X-Api-Key: $(DEPENDENCY_TRACK_API_KEY)" \
            -H "Content-Type: multipart/form-data" \
            -F "autoCreate=true" \
            -F "projectName=adb-safegate-hello-app" \
            -F "projectVersion=$(Build.BuildId)" \
            -F "bom=@sbom-cyclonedx.json"
          echo "PASS: SBOM uploaded to Dependency-Track"
        else
          echo "INFO: DEPENDENCY_TRACK_URL not set – skipping upload"
        fi
      displayName: 'Upload SBOM to Dependency-Track (continuous monitoring)'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish SCA + SBOM artifacts'
      inputs:
        PathtoPublish: '$(Build.SourcesDirectory)'
        ArtifactName: '02-sca-sbom-reports'
      condition: always()

# =============================================================================
# STAGE 3 – CONTAINER BUILD + IAC SECURITY
# Build image after all pre-build security checks pass
# Tools: Docker, Hadolint, Checkov, OPA/Conftest, Trivy config
# =============================================================================
- stage: Build
  displayName: 'Stage 3 - Container Build and IaC Security'
  dependsOn: SCA_SBOM
  jobs:
  - job: BuildAndIaC
    displayName: 'Build and IaC Security'
    pool:
      vmImage: $(BUILD_POOL)
    steps:

    # Hadolint – Dockerfile linting
    # Reference: https://github.com/hadolint/hadolint
    - script: |
        echo "=== Hadolint – Dockerfile best practices ==="
        docker run --rm \
          -i hadolint/hadolint \
          hadolint \
          --failure-threshold warning \
          --format json \
          - < docker/Dockerfile | tee hadolint-report.json || true
        docker run --rm \
          -i hadolint/hadolint \
          hadolint \
          --failure-threshold warning \
          - < docker/Dockerfile
        echo "PASS: Hadolint – Dockerfile follows best practices"
      displayName: 'Hadolint – Dockerfile linting'

    # Checkov – IaC security
    # Reference: https://www.checkov.io/
    - script: |
        echo "=== Checkov – IaC security scanning ==="
        pip install checkov
        echo "--- Dockerfile ---"
        checkov -f docker/Dockerfile \
          --framework dockerfile \
          --output json \
          --output-file checkov-dockerfile.json || true
        checkov -f docker/Dockerfile --framework dockerfile
        echo "--- K8s manifests ---"
        checkov -f docker/deployment.yaml \
          --framework kubernetes \
          --output json \
          --output-file checkov-k8s.json || true
        checkov -f docker/deployment.yaml \
          --framework kubernetes \
          --soft-fail
        echo "PASS: Checkov – IaC security scan complete"
      displayName: 'Checkov – IaC security (Dockerfile + K8s manifests)'

    # Trivy config – Dockerfile + K8s misconfig
    - script: |
        echo "=== Trivy config – misconfiguration scan ==="
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
        trivy config --severity HIGH,CRITICAL docker/Dockerfile
        trivy config \
          --severity HIGH,CRITICAL \
          --format json \
          --output trivy-config-report.json \
          docker/deployment.yaml
        trivy config --severity HIGH,CRITICAL docker/deployment.yaml
      displayName: 'Trivy config – Dockerfile and K8s misconfig scan'

    # OPA/Conftest – Policy as Code
    # Reference: https://www.conftest.dev/
    - script: |
        echo "=== OPA/Conftest – Policy as Code validation ==="
        curl -L https://github.com/open-policy-agent/conftest/releases/latest/download/conftest_Linux_x86_64.tar.gz | tar xz
        sudo mv conftest /usr/local/bin/

        mkdir -p policy
        cat > policy/security.rego << 'REGO'
package main

# DENY: containers running as root
deny[msg] {
  input.kind == "Deployment"
  container := input.spec.template.spec.containers[_]
  not container.securityContext.runAsNonRoot
  msg := sprintf("DENY: Container '%s' must set runAsNonRoot: true", [container.name])
}

# DENY: privilege escalation allowed
deny[msg] {
  input.kind == "Deployment"
  container := input.spec.template.spec.containers[_]
  container.securityContext.allowPrivilegeEscalation != false
  msg := sprintf("DENY: Container '%s' must set allowPrivilegeEscalation: false", [container.name])
}

# DENY: no resource limits
deny[msg] {
  input.kind == "Deployment"
  container := input.spec.template.spec.containers[_]
  not container.resources.limits
  msg := sprintf("DENY: Container '%s' must define resource limits", [container.name])
}

# DENY: mutable root filesystem
deny[msg] {
  input.kind == "Deployment"
  container := input.spec.template.spec.containers[_]
  container.securityContext.readOnlyRootFilesystem != true
  msg := sprintf("DENY: Container '%s' must set readOnlyRootFilesystem: true", [container.name])
}

# WARN: no readiness probe
warn[msg] {
  input.kind == "Deployment"
  container := input.spec.template.spec.containers[_]
  not container.readinessProbe
  msg := sprintf("WARN: Container '%s' should define a readinessProbe", [container.name])
}
REGO

        conftest test \
          docker/deployment.yaml \
          --policy policy/ \
          --output json | tee opa-report.json || true

        conftest test \
          docker/deployment.yaml \
          --policy policy/
        echo "PASS: OPA/Conftest – all K8s security policies passed"
      displayName: 'OPA/Conftest – Policy as Code (K8s security policies)'

    # Docker build (after all security checks pass)
    - task: Docker@2
      displayName: 'Docker build – multi-stage secure image'
      inputs:
        command: 'build'
        dockerfile: 'docker/Dockerfile'
        buildContext: 'docker/'
        containerRegistry: 'ADB-SAFEGATE-ACR'
        repository: '$(IMAGE_NAME)'
        tags: '$(IMAGE_TAG)'
        arguments: '--no-cache --pull'

    # Non-root verification gate
    - script: |
        echo "=== Security gate – non-root UID verification ==="
        RESULT=$(docker run --rm $(DOCKER_REGISTRY)/$(IMAGE_NAME):$(IMAGE_TAG) id)
        echo "Container identity: $RESULT"
        if echo "$RESULT" | grep -q "uid=10001"; then
          echo "PASS: Non-root UID 10001 confirmed"
        else
          echo "FAIL: Container running as wrong user: $RESULT"
          exit 1
        fi
      displayName: 'Security gate – non-root UID 10001 (HARD FAIL)'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish IaC + build reports'
      inputs:
        PathtoPublish: '$(Build.SourcesDirectory)'
        ArtifactName: '03-iac-build-reports'
      condition: always()

# =============================================================================
# STAGE 4 – IMAGE VULNERABILITY SCAN + SIGNING
# Scan built image, sign it for supply chain security
# Tools: Trivy image, Grype, Cosign, image SBOM
# =============================================================================
- stage: ImageSecurity
  displayName: 'Stage 4 - Image Scan and Signing'
  dependsOn: Build
  jobs:
  - job: ScanAndSign
    displayName: 'Image Vulnerability Scan and Cosign Signing'
    pool:
      vmImage: $(BUILD_POOL)
    steps:

    - script: |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
      displayName: 'Install Trivy'

    # Trivy CRITICAL gate
    - script: |
        echo "=== Trivy CRITICAL vulnerability gate ==="
        trivy image \
          --severity CRITICAL \
          --exit-code $(TRIVY_CRITICAL_EXIT_CODE) \
          --ignore-unfixed \
          --format table \
          $(DOCKER_REGISTRY)/$(IMAGE_NAME):$(IMAGE_TAG)
        echo "PASS: Trivy – 0 CRITICAL vulnerabilities"
      displayName: 'Trivy – CRITICAL gate (HARD FAIL on CRITICAL)'

    # Trivy full HIGH+CRITICAL report
    - script: |
        echo "=== Trivy full vulnerability report ==="
        trivy image \
          --severity CRITICAL,HIGH \
          --ignore-unfixed \
          --format json \
          --output trivy-image-report.json \
          $(DOCKER_REGISTRY)/$(IMAGE_NAME):$(IMAGE_TAG)
        trivy image \
          --severity CRITICAL,HIGH \
          --ignore-unfixed \
          $(DOCKER_REGISTRY)/$(IMAGE_NAME):$(IMAGE_TAG)
        python3 -c "
        import json
        with open('trivy-image-report.json') as f: d = json.load(f)
        c = {}
        for r in d.get('Results', []):
            for v in r.get('Vulnerabilities', []):
                s = v.get('Severity','UNKNOWN')
                c[s] = c.get(s,0) + 1
        print('Scan Summary:')
        for s in ['CRITICAL','HIGH','MEDIUM','LOW']:
            print(f'  {s}: {c.get(s,0)}')
        " 2>/dev/null || true
      displayName: 'Trivy – full HIGH/CRITICAL report'

    # Trivy image SBOM
    - script: |
        echo "=== Trivy – image SBOM generation ==="
        trivy image \
          --format cyclonedx \
          --output sbom-image-cyclonedx.json \
          $(DOCKER_REGISTRY)/$(IMAGE_NAME):$(IMAGE_TAG)
        echo "PASS: Image SBOM generated"
      displayName: 'Trivy – image SBOM (CycloneDX)'

    # Grype – second-opinion scanner
    # Reference: https://github.com/anchore/grype
    - script: |
        echo "=== Grype – second-opinion vulnerability scan ==="
        curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sudo sh -s -- -b /usr/local/bin
        grype $(DOCKER_REGISTRY)/$(IMAGE_NAME):$(IMAGE_TAG) \
          --fail-on critical \
          --output json \
          --file grype-report.json || true
        grype $(DOCKER_REGISTRY)/$(IMAGE_NAME):$(IMAGE_TAG) \
          --fail-on critical
        echo "PASS: Grype – no CRITICAL vulnerabilities"
      displayName: 'Grype – second-opinion image scan'

    # Cosign – image signing (SLSA L2)
    # Reference: https://docs.sigstore.dev/cosign/
    - script: |
        echo "=== Cosign – image signing (supply chain security) ==="
        curl -LO https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64
        chmod +x cosign-linux-amd64
        sudo mv cosign-linux-amd64 /usr/local/bin/cosign

        if [ -n "$(COSIGN_PRIVATE_KEY)" ]; then
          echo "$(COSIGN_PRIVATE_KEY)" > cosign.key
          cosign sign --key cosign.key \
            --annotations "build-id=$(Build.BuildId)" \
            --annotations "pipeline=azure-devops" \
            --annotations "scanned-by=trivy,grype" \
            --annotations "sbom=cyclonedx" \
            $(DOCKER_REGISTRY)/$(IMAGE_NAME):$(IMAGE_TAG)
          rm -f cosign.key
          echo "PASS: Image signed with Cosign (SLSA L2)"
        else
          echo "INFO: Using keyless Cosign signing (OIDC)"
          cosign sign \
            --annotations "build-id=$(Build.BuildId)" \
            $(DOCKER_REGISTRY)/$(IMAGE_NAME):$(IMAGE_TAG) || true
        fi
      displayName: 'Cosign – image signing (supply chain / SLSA L2)'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish image security reports'
      inputs:
        PathtoPublish: '$(Build.SourcesDirectory)'
        ArtifactName: '04-image-security-reports'
      condition: always()

# =============================================================================
# STAGE 5 – DEPLOY TO KUBERNETES
# Only signed, scanned images deploy — OPA Gatekeeper enforces at cluster level
# Manual approval gate for production
# =============================================================================
- stage: Deploy
  displayName: 'Stage 5 - Deploy to Kubernetes'
  dependsOn: ImageSecurity
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployProduction
    displayName: 'Deploy to K8s Production'
    pool:
      vmImage: $(BUILD_POOL)
    environment: 'adb-safegate-production'   # Manual approval gate configured here
    strategy:
      runOnce:
        deploy:
          steps:

          # Verify image signature before deploy
          - script: |
              echo "=== Verifying Cosign image signature ==="
              curl -LO https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64
              chmod +x cosign-linux-amd64
              sudo mv cosign-linux-amd64 /usr/local/bin/cosign
              if [ -n "$(COSIGN_PUBLIC_KEY)" ]; then
                echo "$(COSIGN_PUBLIC_KEY)" > cosign.pub
                cosign verify --key cosign.pub \
                  $(DOCKER_REGISTRY)/$(IMAGE_NAME):$(IMAGE_TAG)
                rm -f cosign.pub
                echo "PASS: Image signature verified – safe to deploy"
              else
                echo "INFO: Signature verification skipped (no public key configured)"
              fi
            displayName: 'Verify Cosign image signature before deploy'

          # Update image tag in manifest
          - script: |
              sed -i "s|hello-app:latest|$(IMAGE_FULL)|g" \
                $(Pipeline.Workspace)/docker/deployment.yaml
              echo "Image updated: $(IMAGE_FULL)"
            displayName: 'Update image tag in manifest'

          # Deploy (OPA Gatekeeper admission webhook rejects non-compliant pods)
          - task: KubernetesManifest@0
            displayName: 'Apply K8s manifests (Gatekeeper enforces OPA policies)'
            inputs:
              action: 'deploy'
              kubernetesServiceConnection: 'ADB-SAFEGATE-K8S'
              namespace: '$(K8S_NAMESPACE)'
              manifests: '$(Pipeline.Workspace)/docker/deployment.yaml'
              imagePullSecrets: 'acr-pull-secret'

          # Verify rollout
          - task: Kubernetes@1
            displayName: 'Verify deployment rollout (120s)'
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: 'ADB-SAFEGATE-K8S'
              namespace: '$(K8S_NAMESPACE)'
              command: 'rollout'
              arguments: 'status deployment/$(DEPLOYMENT_NAME) --timeout=120s'

# =============================================================================
# STAGE 6 – POST-DEPLOY: Runtime Security + DAST + Compliance
# Validate running system, detect runtime threats, DAST scan
# Tools: Falco, OWASP ZAP, kube-bench, Lynis
# =============================================================================
- stage: PostDeploy
  displayName: 'Stage 6 - Runtime Security + DAST + Compliance'
  dependsOn: Deploy
  jobs:
  - job: RuntimeAndDAST
    displayName: 'Runtime Security + DAST + Compliance'
    pool:
      vmImage: $(BUILD_POOL)
    steps:

    # Smoke tests – fast fail
    - script: |
        echo "=== Smoke tests – endpoint verification ==="
        APP_URL="http://$(K8S_SERVICE_IP):30080"
        HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" "$APP_URL")
        [ "$HTTP_CODE" = "200" ] && echo "PASS: Root endpoint HTTP 200" || { echo "FAIL: HTTP $HTTP_CODE"; exit 1; }
        HEALTH=$(curl -sf "$APP_URL/health")
        echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if d.get('status')=='ok' else 1)" \
          && echo "PASS: Health endpoint status=ok" || { echo "FAIL: $HEALTH"; exit 1; }
      displayName: 'Smoke tests – fast fail endpoint check'

    # Falco – runtime security monitoring
    # Reference: https://falco.org/
    # In production: runs as DaemonSet monitoring all syscalls
    - script: |
        echo "=== Falco – runtime security monitoring ==="
        echo ""
        echo "Falco runs as K8s DaemonSet – deployed separately:"
        echo "  helm repo add falcosecurity https://falcosecurity.github.io/charts"
        echo "  helm install falco falcosecurity/falco --namespace falco --create-namespace"
        echo ""
        echo "Rules enforced at runtime:"
        echo "  - No shell spawn in containers (exec /bin/sh)"
        echo "  - No writes to /etc, /usr, /bin"
        echo "  - No unexpected network connections"
        echo "  - No privilege escalation attempts"
        echo "  - No container escape via mounts"
        echo "  - Sensitive file reads detected (/etc/shadow)"
        echo ""
        echo "Alerts stream to: SIEM / Slack / Teams / PagerDuty"
        echo ""
        echo "Checking for anomalous K8s events in $(K8S_NAMESPACE)..."
        kubectl get events \
          -n $(K8S_NAMESPACE) \
          --sort-by='.lastTimestamp' \
          --field-selector type=Warning 2>/dev/null | head -20 || true
      displayName: 'Falco – runtime threat detection (K8s DaemonSet)'

    # OWASP ZAP – DAST baseline scan
    # Reference: https://www.zaproxy.org/
    - script: |
        echo "=== OWASP ZAP – DAST baseline scan ==="
        APP_URL="http://$(K8S_SERVICE_IP):30080"
        docker run --rm \
          -v $(Build.ArtifactStagingDirectory):/zap/wrk:rw \
          ghcr.io/zaproxy/zaproxy:stable \
          zap-baseline.py \
          -t "$APP_URL" \
          -r zap-report.html \
          -x zap-report.xml \
          -J zap-report.json \
          -I -l WARN 2>/dev/null || true
        echo "PASS: ZAP DAST scan complete – review zap-report.html"
      displayName: 'OWASP ZAP – DAST baseline scan'

    # kube-bench – CIS Kubernetes benchmark
    # Reference: https://github.com/aquasecurity/kube-bench
    - script: |
        echo "=== kube-bench – CIS Kubernetes benchmark ==="
        kubectl apply -f k8s-cluster/kube-bench-job.yaml
        kubectl wait \
          --for=condition=complete job/kube-bench \
          --timeout=120s -n default
        kubectl logs job/kube-bench | tee kube-bench-report.txt
        kubectl delete job/kube-bench
        echo ""
        grep -E "== Summary|PASS|FAIL|WARN" kube-bench-report.txt | tail -10 || true
      displayName: 'kube-bench – CIS Kubernetes benchmark compliance'

    # Lynis – OS hardening compliance
    # Reference: https://cisofy.com/lynis/
    - script: |
        echo "=== Lynis – OS hardening compliance ==="
        sudo apt-get install -y lynis
        sudo lynis audit system \
          --quiet \
          --no-colors \
          --logfile lynis-audit.log \
          2>/dev/null | tee lynis-report.txt || true
        echo ""
        grep "Hardening index\|Tests performed\|Warnings\|Suggestions" lynis-report.txt || true
      displayName: 'Lynis – OS hardening compliance audit'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish runtime + DAST + compliance reports'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: '05-post-deploy-reports'
      condition: always()

    - task: PublishTestResults@2
      displayName: 'Publish DAST test results'
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '**/zap-report.xml'
        testRunTitle: 'OWASP ZAP DAST'
        failTaskOnFailedTests: false
      condition: always()

    # Teams notification
    - task: IncomingWebhook@1
      displayName: 'Notify Teams – pipeline complete'
      inputs:
        webhookUri: '$(TEAMS_WEBHOOK_URL)'
        messageBody: |
          {
            "text": "ADB SAFEGATE Pipeline | Build $(Build.BuildId) | $(Agent.JobStatus)\nImage: $(IMAGE_FULL)\nBranch: $(Build.SourceBranchName)"
          }
      condition: always()

